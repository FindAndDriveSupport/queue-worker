name = "queue-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
tail_consumers = [{ service = "alert-worker" }]

[[kv_namespaces]]
binding = "LEADS_SYNC_CACHE"
id = "5bdb23b812e54e0fbd9b70dfa25cd5db"

# Replaces the old INTEGRATION_QUEUE producer — per-lead traffic goes
# through a direct Service Binding call now instead of a queue message,
# since Queues operations have a 10k/day budget on the free plan and
# Service Binding calls don't count against it. See worker.js file header.
[[services]]
binding = "INTEGRATION_WORKER"
service = "integration-worker"

# Replaces the old DIGEST_QUEUE producer — same reasoning as above.
[[services]]
binding = "DIGEST_WORKER"
service = "digest-worker"

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 0.2

